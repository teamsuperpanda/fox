name: Release Screenshots

on:
  push:
    branches: ['main']

jobs:
  generate_screenshots:
    name: Generate Store Screenshots
    if: startsWith(github.event.head_commit.message, 'Release')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localization
        run: flutter gen-l10n

      - name: Generate goldens
        run: flutter test --update-goldens test/screenshot_test.dart test/screenshot_decorated_test.dart

      - name: Copy goldens to Fastlane folders
        run: |
          declare -A MAP=(
            [ar]=ar-SA  [bn]=bn-BN  [cs]=cs-CZ  [da]=da-DK
            [de]=de-DE  [el]=el-GR  [en]=en-US  [es]=es-ES
            [es_419]=es-419  [fi]=fi-FI  [fr]=fr-FR  [he]=he-IL
            [hi]=hi-IN  [id]=id-ID  [it]=it-IT  [ja]=ja-JP
            [ko]=ko-KR  [ms]=ms-MY  [nl]=nl-NL  [pl]=pl-PL
            [pt]=pt-BR  [pt_PT]=pt-PT  [ro]=ro-RO  [ru]=ru-RU
            [sv]=sv-SE  [th]=th-TH  [tr]=tr-TR  [uk]=uk-UA
            [vi]=vi-VN  [zh]=zh-CN  [zh_TW]=zh-TW
          )

          for tag in "${!MAP[@]}"; do
            fl="${MAP[$tag]}"

            # Android
            src="test/golden/android/decorated/$tag"
            dst="android/fastlane/metadata/android/$fl/images/phoneScreenshots"
            if [ -d "$src" ]; then
              mkdir -p "$dst" && cp "$src"/*.png "$dst/"
            fi

            # iOS
            dst="ios/fastlane/screenshots/$fl"
            mkdir -p "$dst"
            for dev in iphone_6.5 iphone_6.9 iphone_5.5; do
              case "$dev" in
                iphone_6.5) pfx="iPhone65";;
                iphone_6.9) pfx="iPhone69";;
                iphone_5.5) pfx="iPhone55";;
              esac
              if [ -d "test/golden/$dev/decorated/$tag" ]; then
                for f in test/golden/$dev/decorated/$tag/*.png; do
                  cp "$f" "$dst/$pfx-${f##*/}"
                done
              fi
            done
          done

      - name: Commit Fastlane screenshots
        run: |
          git config user.name "Fox Screenshot Bot"
          git config user.email "bot@foxnotes.app"
          git add android/fastlane/ ios/fastlane/screenshots/
          if git diff --cached --quiet; then
            echo "No screenshots to commit"
          else
            git commit -m "chore: update store screenshots [skip ci]"
            git push
          fi
